<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dkhol l site</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
background:radial-gradient(circle at top,#1a1a1a,#000);
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.center{text-align:center}

.title{
color:white;
font-size:2rem;
margin-bottom:20px;
}

button{
padding:15px 35px;
border:none;
border-radius:30px;
background:#2d2d2d;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.sparkle{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:fall linear infinite;
}

@keyframes fall{
from{transform:translateY(-10vh);opacity:1;}
to{transform:translateY(110vh);opacity:0;}
}
</style>
</head>

<body>

<div class="center">
<div class="title">dkhol l site nkmk</div>
<button onclick="window.location.href='page.html'">dkhol</button>
</div>

<script>
setInterval(()=>{
const s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*window.innerWidth+"px";
s.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(s);
setTimeout(()=>s.remove(),5000);
},80);
</script>

</body>
</html>
