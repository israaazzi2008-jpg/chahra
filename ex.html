<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ex</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial;
background:black;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

/* background images */
.bg{
position:fixed;
width:200%;
height:200%;
display:grid;
grid-template-columns:repeat(6,1fr);
opacity:0.12;
}

.bg img{
width:100%;
height:100%;
object-fit:cover;
filter:grayscale(80%);
}

/* glitch effect */
.glitch{
position:fixed;
width:100%;
height:100%;
background:rgba(255,0,0,0.05);
animation:shake 0.2s infinite;
}

@keyframes shake{
0%{transform:translate(0,0);}
50%{transform:translate(2px,-2px);}
100%{transform:translate(-2px,2px);}
}

/* center */
.center{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:#222;
padding:25px;
border-radius:20px;
text-align:center;
color:white;
box-shadow:0 0 15px red;
}
</style>
</head>

<body>

<div class="bg">
<img src="ex.jpg">
<img src="ex.jpg">
<img src="ex.jpg">

</div>

<div class="glitch"></div>

<div class="center">
<div class="box">
💔 siri fhalek 💔<br><br>
nti bghiti  😏
</div>
</div>

</body>
</html>
