<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micheal</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial;
background:black;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;transform:scale(1.05);}
to{opacity:1;transform:scale(1);}
}

/* BACKGROUND (3 REPEATS ONLY) */
.bg{
position:fixed;
inset:0;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-auto-rows:33vh;
opacity:0.35;
z-index:0;
}

.bg img{
width:100%;
height:100%;
object-fit:cover;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
z-index:1;
}

/* CENTER CONTENT */
.center{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
z-index:2;
}

.box{
background:rgba(30,30,30,0.9);
padding:25px;
border-radius:20px;
text-align:center;
color:white;
box-shadow:0 0 25px #6fa8ff;
}

/* FLOATING HEARTS */
.heart{
position:absolute;
color:#6fa8ff;
font-size:18px;
animation:float 6s linear infinite;
z-index:2;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<!-- BACKGROUND (ONLY 3 IMAGES) -->
<div class="bg">
<img src="mich.jpg">
<img src="mich.jpg">
<img src="mich.jpg">
</div>

<div class="overlay"></div>

<div class="center">
<div class="box">
💙 ntzwej bik lmlawi chahra 😂<br><br>
wela rogdi w nomini 😏
</div>
</div>

<script>
setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerHTML="💙";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(12+Math.random()*20)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);
</script>

</body>
</html>
